<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A static Valentine web experience hosted on GitHub Pages. No login, no downloads, and no data collection.">
    <meta name="robots" content="index,follow">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="theme-color" content="#9f1239">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; media-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; script-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests">
    <meta property="og:title" content="Valentine Web Experience">
    <meta property="og:description" content="A static GitHub Pages demo with local media only and no data collection.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://agarwalujala3-lang.github.io/VALENTINE-CHAUDHRAIN/">
    <meta property="og:image" content="https://agarwalujala3-lang.github.io/VALENTINE-CHAUDHRAIN/images/ssV.png">
    <link rel="canonical" href="https://agarwalujala3-lang.github.io/VALENTINE-CHAUDHRAIN/">
    <link rel="icon" href="images/i14.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Valentine Web Experience | GitHub Pages</title>
</head>
<body>
    <div class="video-background-container">
        <video autoplay muted loop playsinline id="bgVideo" src="images/v5.mp4"></video>
        <div class="video-overlay"></div>
    </div>

    <main class="glass-card">
        <img src="images/i14.jpg" alt="Valentine illustration" class="love-gif">

        <div class="msg" aria-live="polite">
            <p>Roses are red, violets are blue,</p>
            <p>My heart beats faster whenever I see you.</p>
            <h1>Will you be my Valentine, my love?</h1>
        </div>

        <div class="btn-container">
            <button id="yes-btn" class="primary-btn" type="button">Yes</button>
            <button id="no-btn" class="secondary-btn" type="button">No</button>
        </div>

        <div class="site-trust" aria-label="Site information">
            <p class="site-owner">
                Published by
                <a href="https://github.com/agarwalujala3-lang" target="_blank" rel="noopener noreferrer">@agarwalujala3-lang</a>
            </p>
            <p class="site-note">Static site on GitHub Pages. No login, no downloads, and no data collection.</p>
            <a class="site-link" href="https://github.com/agarwalujala3-lang/VALENTINE-CHAUDHRAIN" target="_blank" rel="noopener noreferrer">View source on GitHub</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
